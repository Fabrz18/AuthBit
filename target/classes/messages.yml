  # Unregister Messages
  error-unregister: "&cError: /unregister <nick>"
  account-reset: "&eTu cuenta ha sido reseteada por un administrador."
  # Other
  contrasena-incorrecta: "&cContraseña incorrecta."
  inicia-sesion-primero: "&cInicia sesión primero."
  sin-permiso: "&cNo tienes permiso para ejecutar este comando."
  user-invalid: "&cEl usuario no existe."

  # Premium messages
  already-premium: "&cYa eres premium."
  premium-activated: "&aModo premium activado. Vuelve a entrar al servidor."
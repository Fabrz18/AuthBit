mensajes:
  prefix: "&8[&6AuthBit&8] "

  # Player events Messages
  player-join: "&8[&a+&8] &f"
  player-leave: "&8[&4-&8] &f"

  # Login Messages
  login-exitoso: "&a¡Sesión iniciada!"
